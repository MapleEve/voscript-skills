name: Publish to npm + GitHub Release

on:
  push:
    branches:
      - main
    paths:
      - 'voscript-api/**'
      - 'bin/**'
      - 'package.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Check version changed
        id: version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view voscript-skills version 2>/dev/null || echo "0.0.0")
          echo "pkg=$PKG_VERSION" >> $GITHUB_OUTPUT
          echo "npm=$NPM_VERSION" >> $GITHUB_OUTPUT
          if [ "$PKG_VERSION" != "$NPM_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        run: |
          gh release create "v${{ steps.version.outputs.pkg }}" \
            --title "v${{ steps.version.outputs.pkg }}" \
            --notes "$(cat <<'NOTES'
          Install or update:
          ```bash
          npx voscript-skills
          ```
          Full changelog: https://github.com/MapleEve/voscript-skills/commits/main
          npm: https://www.npmjs.com/package/voscript-skills
          NOTES
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
